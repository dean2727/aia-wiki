name: Nightly Wiki Update

on:
  schedule:
    - cron: '0 2 * * *'   # 2am UTC every night
  workflow_dispatch:        # allow manual trigger

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout wiki (public)
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked

      - name: Fetch RSS feeds
        run: |
          echo "::group::RSS Ingestion"
          trap 'echo "::endgroup::"' EXIT
          uv run python pipeline/scripts/ingest_rss.py
        env:
          PRIVATE_REPO_PATH: private

      # TODO: We implement a new fetch, then test locally, then enable it in workflow (with PR review)
      # - name: Fetch YouTube transcripts
      #   run: uv run python pipeline/scripts/ingest_youtube.py
      #   env:
      #     PRIVATE_REPO_PATH: private

      # - name: Fetch Notion personal notes
      #   run: uv run python pipeline/scripts/ingest_notion.py
      #   env:
      #     NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      #     NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      #     PRIVATE_REPO_PATH: private

      # - name: Process URL queue
      #   run: uv run python pipeline/scripts/ingest_queue.py
      #   env:
      #     PRIVATE_REPO_PATH: private

      - name: Run Claude Code — triage and update wiki
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-6
            --verbose
          prompt: |
            Perform the nightly wiki update for aia-wiki.

            1. Read private/profile/Dean-Profile.md to load Dean's user model.
            2. Read all files in private/sources/staging/ — these are today's ingested sources.
            3. Triage each source using the signal threshold in CLAUDE.md. Score each 1–10.
            4. For each source scoring 7 or above:
               - Create a new wiki page OR update the existing relevant page
               - Place it in wiki/topics/, wiki/synthesis/, or wiki/tools/ as appropriate
               - Include a Dean-Relevance section referencing his current profile
            5. Update CHANGELOG.md with a dated entry listing created, updated, and skipped items.
            6. Do NOT regenerate INDEX.md — that runs weekly.
            7. Do NOT touch any files in private/ — read only.

            Follow all guidelines in CLAUDE.md exactly.

      - name: Write run summary
        if: always()
        run: |
          echo "## Nightly Wiki Run — $(date '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ingestion" >> $GITHUB_STEP_SUMMARY
          cat private/sources/staging/.run-summary >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No summary written" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Wiki Changes" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No previous commit to compare" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
